<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Inventario</title>
    <style>
        body { font-family: sans-serif; margin: 40px; line-height: 1.6; }
        .container { max-width: 600px; margin: auto; border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        .menu-link { display: inline-block; margin-bottom: 20px; color: blue; text-decoration: none; font-weight: bold; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; border: none; padding: 10px 15px; cursor: pointer; width: 100%; border-radius: 4px; }
        button:hover { background-color: #218838; }
        hr { margin: 30px 0; }
    </style>
</head>
<body>

    <div class="container">
        <h1>📦 Control de Inventario</h1>
        
        <nav>
            <a class="menu-link" href="/reporte">📊 Ver Reporte de Inventario</a>
        </nav>

        <hr>
        <div class="container" style="background-color: #f8f9fa; margin-bottom: 20px;">
    <h3>🆕 Dar de Alta Nuevo Producto</h3>
    <form action="/crear_producto" method="POST">
        <div class="form-group">
            <input type="text" name="codigo" placeholder="Código (ej: ABC-01)" required>
        </div>
        <div class="form-group">
            <input type="text" name="descripcion" placeholder="Descripción del artículo" required>
        </div>
        <div class="form-group">
            <input type="number" step="0.01" name="costo" placeholder="Costo en Euros (€)" required>
        </div>
        <button type="submit" style="background-color: #007bff;">Crear Producto</button>
    </form>
</div>

<hr>
        <h3>Registrar Movimiento (Entrada/Salida)</h3>
        <p>Introduce el código del producto para actualizar su stock.</p>

        <form action="/movimiento" method="POST">
            <div class="form-group">
                <label for="codigo">Código del Producto:</label>
                <input type="text" id="codigo" name="codigo" placeholder="Ej: PROD001" required>
            </div>

            <div class="form-group">
                <label for="tipo">Tipo de Movimiento:</label>
                <select id="tipo" name="tipo">
                    <option value="entrada">Entrada (+)</option>
                    <option value="salida">Salida (-)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="cantidad">Cantidad de Items:</label>
                <input type="number" id="cantidad" name="cantidad" min="1" required>
            </div>

            <button type="submit">Actualizar Inventario</button>
        </form>
    </div>

</body>
</html>
