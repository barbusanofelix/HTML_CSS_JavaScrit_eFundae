<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Mi Servidor Estático</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background-color: #f4f4f9;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
            }

            .card {
                background: white;
                padding: 2rem;
                border-radius: 10px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
                text-align: center;
            }

            h1 {
                color: #333;
            }

            p {
                color: #666;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <h1>¡Hola desde el archivo estático!</h1>
            <p>Este archivo HTML está siendo servido por Node.js y Express.</p>
            <p>Servidor funcionando en el puerto 3000.</p>
        </div>
    </body>
</html>
